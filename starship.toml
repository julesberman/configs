# ~/.config/starship.toml

# One-line prompt: left side has the usual info, right side has full path
format = "$python$directory$git_branch$git_state$git_status$cmd_duration${custom.claude_code}$character"
right_format = "${custom.full_path}"

add_newline = false

# ─── Git branch — no symbol ─────────────────────────────
[git_branch]
symbol = ""
format = "on [$branch]($style) "
truncation_length = 40
truncation_symbol = "…"

# ─── Git status ─────────────────────────────────────────
# Shows a bracketed summary of your working tree state.
# The symbols that can appear inside [ ]:
#
#   !  = modified     (tracked files with unstaged changes)   — yellow
#   +  = staged       (changes added with `git add`)          — green
#   ?  = untracked    (new files git doesn't know about yet)  — blue
#   $  = stashed      (you have stashes saved)                — cyan
#   =  = conflicted   (merge conflicts need resolving)        — red
#   »  = renamed      (files git detected as renames)         — purple
#   ✘  = deleted      (tracked files you've removed)          — red
#   ⇡N = ahead        (N commits ahead of upstream)           — green
#   ⇣N = behind       (N commits behind upstream)             — red
#   ⇕  = diverged     (both ahead and behind)                 — yellow
#
# Example: [!2+1⇡3] = 2 modified, 1 staged, 3 commits ahead of origin
[git_status]
modified = "[!](bold yellow)"
staged = "[+](bold green)"
untracked = "[?](bold blue)"
stashed = "[\\$](bold cyan)"
conflicted = "[=](bold red)"
renamed = "[»](bold purple)"
deleted = "[✘](bold red)"
ahead = "[⇡${count}](bold green)"
behind = "[⇣${count}](bold red)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count}](bold yellow)"
# Keep the brackets themselves neutral so the colored symbols pop
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "white"

# ─── Python — simple ──────────────────────────────────
[python]
format = '[\($virtualenv $version\)]($style) '
version_format = 'v${major}.${minor}'
style = 'italic #7be213'
python_binary = 'python3'
detect_extensions = []
detect_files = []
detect_folders = []

# ─── Command duration ───────────────────────────────────
[cmd_duration]
min_time = 200
show_milliseconds = true
format = '[$duration](italic green) '

# ─── Claude Code indicator ──────────────────────────────
[custom.claude_code]
description = "Show when running inside Claude Code"
command = "echo claude"
when = '[ -n "$CLAUDECODE" ] || [ -n "$CLAUDE_CODE" ]'
format = "[ 󰚩 $output]($style) "
style = "bold magenta"

# ─── Full path on the right (italic, truncated, bright cyan) ─
[custom.full_path]
description = "Full working directory path on the right"
command = "p=$(pwd | sed \"s|^$HOME|~|\"); if [ ${#p} -gt 60 ]; then echo \"…${p: -59}\"; else echo \"$p\"; fi"
when = "true"
format = "[$output]($style)"
style = "bold italic #89dceb"

# ─── Prompt character ───────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[✖](bold red)"
